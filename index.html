<!DOCTYPE html>
<html lang="de">
  <head>

        </div>
        <div class="images">

              <img src="assets/preview/2025/07-19/1.webp" alt="Schwarze Banane">

          </div>

            </div>
            <div class="pointer"></div>
            <div class="spacer"></div>
            <div class="image-group">
              <img src="assets/preview/2025/07-19/1.webp" alt="Schwarze Banane">

            </div>
          </div>
        </div>
      </div>
      <h1 id="title">Farning Kühlschrankarchiv</h1>

    <script src="script.js" defer></script>
